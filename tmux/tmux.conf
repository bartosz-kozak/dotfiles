unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

#-------------------------------------------------------
# configure tmux
#-------------------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g set-clipboard on          # use system clipboard

#-------------------------------------------------------
# Renaming
#-------------------------------------------------------
set -g allow-rename off

#-------------------------------------------------------
# Undercurl
#-------------------------------------------------------
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

#-------------------------------------------------------
# Theme
#-------------------------------------------------------
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style "none"

set -g @catppuccin_session_color "#{@thm_mauve}"
set -g @catppuccin_directory_color "#{@thm_lavender}"
set -g @catppuccin_uptime_color "#{@thm_pink}"
set -g @catppuccin_date_time_color "#{@thm_yellow}"

set -g @catppuccin_directory_icon " "
set -g @catppuccin_session_icon " "

# online status
set -g @online_icon "ok"
set -g @offline_icon "nok"

#-------------------------------------------------------
# Left Status
#-------------------------------------------------------
set -g status-left-length 120
set -g status-left "#{E:@catppuccin_status_session}"

#-------------------------------------------------------
# Right Status
#-------------------------------------------------------
set -g status-right-length 160
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{?#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null),#{E:@catppuccin_status_git},}"
set -ag status-right "#{?#{CONDA_DEFAULT_ENV},#{E:@catppuccin_status_conda},}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

#-------------------------------------------------------
# Status
#-------------------------------------------------------
set -g @catppuccin_status_connect_separator "no" # yes, no
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_right_separator " "
# set -g @catppuccin_status_middle_separator ""

#-------------------------------------------------------
# window look and feel
#-------------------------------------------------------
set -wg automatic-rename on
set -g automatic-rename-format "#{window_icon} #{b:pane_current_command}"
set -g window-status-style "bg=default,fg=#{@thm_sapphire},bold"
set -g window-status-last-style "bg=default,fg=#{@thm_blue},bold"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay_0},bold]│"
set -g window-status-current-style "bg=#{@thm_sky},fg=#{@thm_bg},bold"

#-------------------------------------------------------
# pane border look and feel
#-------------------------------------------------------
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
run-shell '~/.config/tmux/plugins/tmux-battery/battery.tmux'
source-file ~/.config/tmux/git.conf
source-file ~/.config/tmux/conda.conf
